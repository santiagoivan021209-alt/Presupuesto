<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Presupuesto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --text: #f0f1f3;
    --muted: #6b7280;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --accent: #6ee7b7;
    --accent2: #a78bfa;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

  #app { height: 100dvh; display: flex; flex-direction: column; max-width: 420px; margin: 0 auto; position: relative; overflow: hidden; }

  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.25s ease, transform 0.25s ease; transform: translateX(30px); overflow-y: auto; }
  .screen.active { opacity: 1; pointer-events: all; transform: translateX(0); }

  .field-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 8px; display: block; }
  .field-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 18px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); font-weight: 400; font-size: 15px; }

  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; margin-top: 32px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Setup */
  #setup-screen { background: var(--bg); }
  .setup-hero { padding: 44px 24px 28px; }
  .setup-hero h1 { font-size: 34px; font-weight: 800; line-height: 1.1; margin-bottom: 8px; }
  .setup-hero h1 span { color: var(--accent); }
  .setup-hero p { color: var(--muted); font-size: 14px; line-height: 1.5; }
  .setup-content { padding: 0 24px 130px; flex: 1; }
  .field-group { margin-bottom: 20px; }

  .category-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
  .cat-name-input { flex: 2; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 15px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.15s; }
  .cat-name-input:focus { border-color: var(--accent); }
  .cat-name-input::placeholder { color: var(--muted); font-weight: 400; font-size: 13px; }
  .cat-budget-input { flex: 1.2; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 15px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; outline: none; transition: border-color 0.15s; }
  .cat-budget-input:focus { border-color: var(--accent); }
  .cat-budget-input::placeholder { color: var(--muted); font-weight: 400; }
  .remove-cat { width: 36px; height: 36px; border-radius: 50%; background: none; border: 1.5px solid var(--border); color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .remove-cat:hover { border-color: var(--red); color: var(--red); }

  .add-cat-btn { width: 100%; padding: 12px; background: none; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'Syne', sans-serif; margin-top: 4px; }
  .add-cat-btn:hover { border-color: var(--accent); color: var(--accent); }

  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; padding: 16px 24px 32px; background: linear-gradient(to top, var(--bg) 70%, transparent); z-index: 100; }
  .btn-primary { width: 100%; padding: 18px; background: var(--accent); color: #0a0e0c; font-size: 16px; font-weight: 800; border: none; border-radius: var(--radius); cursor: pointer; font-family: 'Syne', sans-serif; letter-spacing: 0.02em; transition: all 0.15s; }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

  /* Dashboard */
  #dashboard-screen { background: var(--bg); }
  .dash-header { padding: 48px 24px 0; flex-shrink: 0; }
  .dash-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .dash-month { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .settings-btn { width: 36px; height: 36px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 16px; transition: all 0.15s; }
  .settings-btn:hover { border-color: var(--accent); color: var(--accent); }

  .hero-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
  .hero-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(110,231,183,0.08) 0%, transparent 70%); border-radius: 50%; }
  .hero-row { display: flex; gap: 0; }
  .hero-divider { width: 1px; background: var(--border); margin: 0 14px; align-self: stretch; }
  .hero-stat { flex: 1; }
  .hero-stat-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .hero-stat-val { font-size: 20px; font-weight: 700; }
  .hero-stat-val.green { color: var(--green); }
  .hero-stat-val.red { color: var(--red); }
  .hero-stat-val.yellow { color: var(--yellow); }

  .alerts-bar { margin: 10px 24px 0; display: flex; flex-direction: column; gap: 6px; }
  .alert-chip { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .alert-chip.warn { background: rgba(245,158,11,0.12); color: var(--yellow); border: 1px solid rgba(245,158,11,0.25); }
  .alert-chip.danger { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }

  .categories-list { padding: 14px 24px 140px; flex: 1; }
  .cat-section-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .cat-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .cat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s; }
  .cat-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cat-name { font-size: 15px; font-weight: 700; }
  .cat-emoji { font-size: 17px; margin-right: 7px; }
  .cat-remaining { font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .cat-remaining.safe { color: var(--green); }
  .cat-remaining.warn { color: var(--yellow); }
  .cat-remaining.over { color: var(--red); }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .progress-fill.safe { background: var(--green); }
  .progress-fill.warn { background: var(--yellow); }
  .progress-fill.over { background: var(--red); }
  .cat-card-bottom { display: flex; justify-content: space-between; }
  .cat-spent-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* FAB */
  .fab { position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%); z-index: 200; }
  .fab-btn { width: 64px; height: 64px; background: var(--accent); color: #0a0e0c; border: none; border-radius: 50%; font-size: 32px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(110,231,183,0.35); transition: all 0.15s; }
  .fab-btn:active { transform: scale(0.92); }
  .fab-hidden { display: none; }

  /* Agregar gasto */
  #add-expense-screen { background: var(--bg); }
  .add-header { padding: 52px 24px 20px; flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
  .back-btn { width: 36px; height: 36px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 20px; font-weight: 300; flex-shrink: 0; transition: all 0.15s; }
  .add-title { font-size: 22px; font-weight: 800; }

  .add-content { padding: 0 24px 110px; flex: 1; }
  .amount-display { text-align: center; padding: 20px 0 18px; }
  .amount-prefix { font-size: 26px; font-weight: 700; color: var(--muted); vertical-align: super; margin-right: 4px; }
  .amount-value { font-size: 54px; font-weight: 800; font-family: 'DM Mono', monospace; letter-spacing: -2px; color: var(--text); }
  .amount-cursor { display: inline-block; width: 3px; height: 50px; background: var(--accent); margin-left: 2px; vertical-align: middle; animation: blink 1s infinite; }
  @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .num-btn { padding: 17px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 22px; font-weight: 700; color: var(--text); cursor: pointer; font-family: 'DM Mono', monospace; text-align: center; transition: all 0.1s; user-select: none; }
  .num-btn:active { background: var(--surface2); transform: scale(0.95); }
  .num-btn.del { color: var(--muted); font-size: 18px; }
  .num-btn.zero { grid-column: span 2; }

  .cat-picker { margin-bottom: 16px; }
  .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .cat-chip { padding: 8px 14px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .cat-chip:active { transform: scale(0.95); }
  .cat-chip.selected { background: rgba(110,231,183,0.12); border-color: var(--accent); color: var(--accent); }

  .date-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-top: 1px solid var(--border); margin-bottom: 16px; }
  .date-label-txt { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .date-value { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }

  /* Resumen */
  #summary-screen { background: var(--bg); }
  .summary-header { padding: 52px 24px 20px; flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
  .summary-content { padding: 0 24px 80px; flex: 1; }
  .summary-hero { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .summary-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .summary-stat-row:last-child { border-bottom: none; }
  .summary-stat-key { font-size: 13px; color: var(--muted); font-weight: 600; }
  .summary-stat-val { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .summary-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .summary-item-name { font-size: 14px; font-weight: 600; }
  .summary-item-val { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .summary-item-val.red { color: var(--red); }
  .summary-item-val.green { color: var(--green); }

  /* Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: var(--bg); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding: 10px 0 22px; z-index: 150; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; color: var(--muted); padding: 6px 20px; transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; }

  /* Toast */
  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--surface); border: 1.5px solid var(--border); border-radius: 99px; padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--text); z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="app">

  <!-- PANTALLA DE CONFIGURACIÓN -->
  <div id="setup-screen" class="screen active">
    <div class="setup-hero">
      <h1>Configurá tu<br><span>presupuesto mensual</span></h1>
      <p>Ingresá tus ingresos y asigná un límite a cada categoría de gasto.</p>
    </div>
    <div class="setup-content">
      <div class="field-group">
        <label class="field-label">Ingresos mensuales</label>
        <input type="number" class="field-input" id="income-input" placeholder="ej. 500000" inputmode="decimal">
      </div>
      <div class="section-title">Categorías</div>
      <div id="categories-setup"></div>
      <button class="add-cat-btn" onclick="addCategoryRow()">+ Agregar categoría</button>
    </div>
    <div class="bottom-bar">
      <button class="btn-primary" id="setup-btn" onclick="startBudget()">Empezar a registrar →</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-screen" class="screen">
    <div class="dash-header">
      <div class="dash-top">
        <div class="dash-month" id="dash-month-label">MARZO 2026</div>
        <div class="settings-btn" onclick="goToSettings()" title="Editar presupuesto">⚙</div>
      </div>
      <div class="hero-card">
        <div class="hero-row">
          <div class="hero-stat">
            <div class="hero-stat-label">Disponible</div>
            <div class="hero-stat-val" id="dash-remaining">$0</div>
          </div>
          <div class="hero-divider"></div>
          <div class="hero-stat" style="margin-left:14px;">
            <div class="hero-stat-label">Gastado</div>
            <div class="hero-stat-val" id="dash-spent-total">$0</div>
          </div>
          <div class="hero-divider"></div>
          <div class="hero-stat" style="margin-left:14px;">
            <div class="hero-stat-label">Ahorrado</div>
            <div class="hero-stat-val" id="dash-savings">$0</div>
          </div>
        </div>
      </div>
    </div>
    <div id="alerts-container" class="alerts-bar"></div>
    <div class="categories-list">
      <div class="cat-section-label">Categorías</div>
      <div id="cat-cards"></div>
    </div>
  </div>

  <!-- AGREGAR GASTO -->
  <div id="add-expense-screen" class="screen">
    <div class="add-header">
      <div class="back-btn" onclick="goTo('dashboard')">‹</div>
      <div class="add-title">Registrar gasto</div>
    </div>
    <div class="add-content">
      <div class="amount-display">
        <span class="amount-prefix">$</span><span class="amount-value" id="amount-display">0</span><span class="amount-cursor"></span>
      </div>
      <div class="cat-picker">
        <span class="field-label">Categoría</span>
        <div class="cat-chips" id="cat-chips"></div>
      </div>
      <div class="date-row">
        <span class="date-label-txt">Fecha</span>
        <span class="date-value" id="expense-date"></span>
      </div>
      <div class="numpad">
        <div class="num-btn" onclick="numPress('1')">1</div>
        <div class="num-btn" onclick="numPress('2')">2</div>
        <div class="num-btn" onclick="numPress('3')">3</div>
        <div class="num-btn" onclick="numPress('4')">4</div>
        <div class="num-btn" onclick="numPress('5')">5</div>
        <div class="num-btn" onclick="numPress('6')">6</div>
        <div class="num-btn" onclick="numPress('7')">7</div>
        <div class="num-btn" onclick="numPress('8')">8</div>
        <div class="num-btn" onclick="numPress('9')">9</div>
        <div class="num-btn" onclick="numPress(',')">','</div>
        <div class="num-btn zero" onclick="numPress('0')">0</div>
        <div class="num-btn del" onclick="numDel()">⌫</div>
      </div>
    </div>
    <div class="bottom-bar" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;padding:16px 24px 32px;background:linear-gradient(to top, var(--bg) 70%, transparent);z-index:100;">
      <button class="btn-primary" onclick="confirmExpense()">✓ &nbsp;Guardar gasto</button>
    </div>
  </div>

  <!-- RESUMEN MENSUAL -->
  <div id="summary-screen" class="screen">
    <div class="summary-header">
      <div class="back-btn" onclick="goTo('dashboard')">‹</div>
      <div class="add-title">Resumen del mes</div>
    </div>
    <div class="summary-content" id="summary-content"></div>
  </div>

  <!-- Botón flotante -->
  <div class="fab" id="fab">
    <button class="fab-btn" onclick="goTo('add-expense')" title="Registrar gasto">+</button>
  </div>

  <!-- Navegación inferior -->
  <nav class="bottom-nav" id="bottom-nav" style="display:none;">
    <button class="nav-btn active" id="nav-dash" onclick="goTo('dashboard')">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Presupuesto</span>
    </button>
    <button class="nav-btn" id="nav-sum" onclick="openSummary()">
      <span class="nav-icon">◎</span>
      <span class="nav-label">Resumen</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script>
let state = {
  income: 0,
  categories: [],
  expenses: [],
  isSetup: false
};

let amountStr = '';
let selectedCatId = null;

const EMOJIS = ['🍕','🚗','🎬','🏠','💊','👕','📚','✈️','☕','🏋️','🎮','🛒','🐾','🎁','💡'];

const MESES = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const MESES_CORTO = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DIAS = ['dom','lun','mar','mié','jue','vie','sáb'];

function save() { localStorage.setItem('mipresupuesto', JSON.stringify(state)); }
function load() { const d = localStorage.getItem('mipresupuesto'); if (d) state = JSON.parse(d); }

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen + '-screen').classList.add('active');
  const fab = document.getElementById('fab');
  const nav = document.getElementById('bottom-nav');
  if (screen === 'dashboard') {
    fab.classList.remove('fab-hidden'); nav.style.display = 'flex';
    document.getElementById('nav-dash').classList.add('active');
    document.getElementById('nav-sum').classList.remove('active');
    renderDashboard();
  } else if (screen === 'add-expense') {
    fab.classList.add('fab-hidden'); nav.style.display = 'none';
    initAddExpense();
  } else if (screen === 'summary') {
    fab.classList.add('fab-hidden'); nav.style.display = 'flex';
    document.getElementById('nav-sum').classList.add('active');
    document.getElementById('nav-dash').classList.remove('active');
    renderSummary();
  } else {
    fab.classList.add('fab-hidden'); nav.style.display = 'none';
  }
}

// Setup
const DEFAULT_CATS = [
  {name:'Comida y salidas', budget:''},
  {name:'Transporte', budget:''},
  {name:'Entretenimiento', budget:''},
];

function renderSetup() {
  const container = document.getElementById('categories-setup');
  container.innerHTML = '';
  state.categories.forEach((c) => {
    container.innerHTML += `
      <div class="category-row" id="cat-row-${c.id}">
        <input class="cat-name-input" placeholder="Nombre de categoría" value="${c.name}" oninput="updateCatName('${c.id}', this.value)">
        <input class="cat-budget-input" type="number" placeholder="$0" value="${c.budget || ''}" oninput="updateCatBudget('${c.id}', this.value)" inputmode="decimal">
        <button class="remove-cat" onclick="removeCat('${c.id}')">×</button>
      </div>`;
  });
}

function addCategoryRow() {
  const id = Date.now().toString();
  state.categories.push({ id, name: '', budget: 0, spent: 0 });
  renderSetup();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.cat-name-input');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function updateCatName(id, val) { state.categories.find(c=>c.id===id).name = val; }
function updateCatBudget(id, val) { state.categories.find(c=>c.id===id).budget = parseFloat(val)||0; }
function removeCat(id) { state.categories = state.categories.filter(c=>c.id!==id); renderSetup(); }

function startBudget() {
  const income = parseFloat(document.getElementById('income-input').value);
  if (!income || income <= 0) { showToast('Ingresá tus ingresos mensuales'); return; }
  const valid = state.categories.filter(c => c.name.trim() && c.budget > 0);
  if (valid.length === 0) { showToast('Agregá al menos una categoría con presupuesto'); return; }
  state.income = income;
  state.categories = valid.map((c, i) => ({ ...c, spent: 0, emoji: EMOJIS[i % EMOJIS.length] }));
  state.isSetup = true;
  save();
  const btn = document.getElementById('setup-btn');
  btn.textContent = 'Empezar a registrar →';
  btn.onclick = startBudget;
  goTo('dashboard');
}

function goToSettings() {
  document.getElementById('income-input').value = state.income;
  renderSetup();
  goTo('setup');
  const btn = document.getElementById('setup-btn');
  btn.textContent = 'Guardar cambios →';
  btn.onclick = saveSettings;
}

function saveSettings() {
  const income = parseFloat(document.getElementById('income-input').value);
  if (!income || income <= 0) { showToast('Ingresá tus ingresos'); return; }
  const valid = state.categories.filter(c => c.name.trim() && c.budget > 0);
  if (valid.length === 0) { showToast('Agregá al menos una categoría'); return; }
  state.income = income;
  state.categories = valid.map((c, i) => ({
    ...c,
    spent: state.categories.find(x=>x.id===c.id)?.spent || 0,
    emoji: state.categories.find(x=>x.id===c.id)?.emoji || EMOJIS[i % EMOJIS.length]
  }));
  save();
  const btn = document.getElementById('setup-btn');
  btn.textContent = 'Empezar a registrar →';
  btn.onclick = startBudget;
  goTo('dashboard');
}

// Dashboard
function fmt(n) {
  const abs = Math.abs(n);
  const formatted = abs.toLocaleString('es-AR', {minimumFractionDigits: 0, maximumFractionDigits: 2});
  return (n < 0 ? '-' : '') + '$' + formatted;
}

function renderDashboard() {
  const now = new Date();
  document.getElementById('dash-month-label').textContent = MESES[now.getMonth()] + ' ' + now.getFullYear();

  const totalBudget = state.categories.reduce((s,c) => s+c.budget, 0);
  const totalSpent = state.categories.reduce((s,c) => s+c.spent, 0);
  const remaining = totalBudget - totalSpent;
  const savings = state.income - totalSpent;

  const remEl = document.getElementById('dash-remaining');
  remEl.textContent = fmt(remaining);
  remEl.className = 'hero-stat-val ' + (remaining >= 0 ? 'green' : 'red');
  document.getElementById('dash-spent-total').textContent = fmt(totalSpent);
  const savEl = document.getElementById('dash-savings');
  savEl.textContent = fmt(savings);
  savEl.className = 'hero-stat-val ' + (savings >= 0 ? 'green' : 'red');

  // Alertas
  const alertsEl = document.getElementById('alerts-container');
  alertsEl.innerHTML = '';
  state.categories.forEach(c => {
    const pct = c.budget > 0 ? c.spent / c.budget : 0;
    if (c.spent > c.budget) {
      alertsEl.innerHTML += `<div class="alert-chip danger">🚨 Superaste el límite en <b>${c.name}</b></div>`;
    } else if (pct >= 0.85) {
      alertsEl.innerHTML += `<div class="alert-chip warn">⚠ Estás cerca del límite en <b>${c.name}</b></div>`;
    }
  });

  // Tarjetas de categorías
  const catEl = document.getElementById('cat-cards');
  if (!state.categories.length) {
    catEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>Sin categorías configuradas.</div>';
    return;
  }
  catEl.innerHTML = state.categories.map(c => {
    const pct = c.budget > 0 ? Math.min(c.spent / c.budget, 1) : 0;
    const over = c.spent > c.budget;
    const warn = !over && pct >= 0.75;
    const cls = over ? 'over' : warn ? 'warn' : 'safe';
    const fillPct = Math.min(pct * 100, 100);
    const rem = c.budget - c.spent;
    const remLabel = over ? `▲ ${fmt(c.spent - c.budget)} excedido` : `${fmt(rem)} disponible`;
    return `
    <div class="cat-card">
      <div class="cat-card-top">
        <div class="cat-name"><span class="cat-emoji">${c.emoji||'💰'}</span>${c.name}</div>
        <div class="cat-remaining ${cls}">${remLabel}</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${cls}" style="width:${fillPct}%"></div>
      </div>
      <div class="cat-card-bottom">
        <span class="cat-spent-label">Gastado: ${fmt(c.spent)}</span>
        <span class="cat-spent-label">Límite: ${fmt(c.budget)}</span>
      </div>
    </div>`;
  }).join('');
}

// Agregar gasto
function initAddExpense() {
  amountStr = '';
  selectedCatId = null;
  updateAmountDisplay();
  const now = new Date();
  document.getElementById('expense-date').textContent =
    DIAS[now.getDay()] + ' ' + now.getDate() + ' de ' + MESES_CORTO[now.getMonth()];
  const chips = document.getElementById('cat-chips');
  chips.innerHTML = state.categories.map(c =>
    `<div class="cat-chip" id="chip-${c.id}" onclick="selectCat('${c.id}')">${c.emoji||''} ${c.name}</div>`
  ).join('');
}

function updateAmountDisplay() {
  document.getElementById('amount-display').textContent = amountStr || '0';
}

function numPress(v) {
  if ((v === ',' || v === '.') && (amountStr.includes(',') || amountStr.includes('.'))) return;
  if ((v === ',' || v === '.') && amountStr === '') amountStr = '0';
  if (amountStr.length >= 10) return;
  amountStr += v;
  updateAmountDisplay();
}

function numDel() {
  amountStr = amountStr.slice(0, -1);
  updateAmountDisplay();
}

function selectCat(id) {
  selectedCatId = id;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
  const chip = document.getElementById('chip-' + id);
  if (chip) chip.classList.add('selected');
}

function confirmExpense() {
  const amount = parseFloat(amountStr.replace(',', '.'));
  if (!amount || amount <= 0) { showToast('Ingresá un monto'); return; }
  if (!selectedCatId) { showToast('Seleccioná una categoría'); return; }
  const cat = state.categories.find(c => c.id === selectedCatId);
  if (!cat) return;
  cat.spent += amount;
  state.expenses.push({ id: Date.now().toString(), categoryId: selectedCatId, amount, date: new Date().toISOString() });
  save();
  showToast(`${fmt(amount)} registrado en ${cat.name}`);
  goTo('dashboard');
}

// Resumen
function openSummary() { goTo('summary'); }

function renderSummary() {
  const totalBudget = state.categories.reduce((s,c) => s+c.budget, 0);
  const totalSpent = state.categories.reduce((s,c) => s+c.spent, 0);
  const savings = state.income - totalSpent;
  const exceeded = state.categories.filter(c => c.spent > c.budget);
  const saved = state.categories.filter(c => c.spent < c.budget);

  const el = document.getElementById('summary-content');
  el.innerHTML = `
    <div class="summary-hero">
      <div class="summary-stat-row"><span class="summary-stat-key">Ingresos del mes</span><span class="summary-stat-val">${fmt(state.income)}</span></div>
      <div class="summary-stat-row"><span class="summary-stat-key">Presupuesto total</span><span class="summary-stat-val">${fmt(totalBudget)}</span></div>
      <div class="summary-stat-row"><span class="summary-stat-key">Total gastado</span><span class="summary-stat-val">${fmt(totalSpent)}</span></div>
      <div class="summary-stat-row"><span class="summary-stat-key">Ahorro potencial</span><span class="summary-stat-val" style="color:${savings>=0?'var(--green)':'var(--red)'}">${fmt(savings)}</span></div>
    </div>
    ${exceeded.length > 0 ? `
    <div class="cat-section-label" style="margin-bottom:12px;">Categorías excedidas</div>
    <div>
      ${exceeded.map(c => `<div class="summary-item"><span class="summary-item-name">${c.emoji||''} ${c.name}</span><span class="summary-item-val red">▲ ${fmt(c.spent - c.budget)}</span></div>`).join('')}
    </div>` : ''}
    ${saved.length > 0 ? `
    <div class="cat-section-label" style="margin-bottom:12px;margin-top:20px;">Dentro del presupuesto</div>
    <div>
      ${saved.map(c => `<div class="summary-item"><span class="summary-item-name">${c.emoji||''} ${c.name}</span><span class="summary-item-val green">▼ ${fmt(c.budget - c.spent)} ahorrado</span></div>`).join('')}
    </div>` : ''}
    <button onclick="resetMonth()" style="width:100%;margin-top:24px;padding:16px;background:var(--surface);color:var(--muted);border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;">Reiniciar mes</button>
  `;
}

function resetMonth() {
  if (!confirm('¿Reiniciar todos los gastos de este mes? El presupuesto configurado se mantiene.')) return;
  state.categories.forEach(c => c.spent = 0);
  state.expenses = [];
  save();
  showToast('¡Mes reiniciado!');
  goTo('dashboard');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// Init
load();
if (state.isSetup && state.categories.length > 0) {
  goTo('dashboard');
} else {
  state.categories = DEFAULT_CATS.map((c, i) => ({
    id: (Date.now() + i).toString(),
    name: c.name, budget: 0, spent: 0, emoji: EMOJIS[i]
  }));
  renderSetup();
}
</script>
