<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="App de presupuesto mensual personal">
<meta name="theme-color" content="#0e0f11">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mi Presupuesto</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1e2026;
  --border: #2a2d35;
  --text: #f0f1f3;
  --muted: #6b7280;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --accent: #6ee7b7;
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }
#app { height: 100dvh; display: flex; flex-direction: column; max-width: 420px; margin: 0 auto; position: relative; overflow: hidden; }

.screen { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.22s ease, transform 0.22s ease; transform: translateX(28px); overflow-y: auto; }
.screen.active { opacity: 1; pointer-events: all; transform: translateX(0); }

.field-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 8px; display: block; }
.section-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; margin-top: 28px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.field-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 18px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.15s; }
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--muted); font-weight: 400; font-size: 15px; }

.btn-primary { width: 100%; padding: 18px; background: var(--accent); color: #071a12; font-size: 16px; font-weight: 800; border: none; border-radius: var(--radius); cursor: pointer; font-family: 'Syne', sans-serif; letter-spacing: 0.02em; transition: opacity 0.15s, transform 0.15s; }
.btn-primary:active { transform: scale(0.98); opacity: 0.88; }

.fixed-bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; padding: 14px 24px 34px; background: linear-gradient(to top, var(--bg) 65%, transparent); z-index: 200; }

/* SETUP */
.setup-hero { padding: 44px 24px 24px; flex-shrink: 0; }
.setup-hero h1 { font-size: 34px; font-weight: 800; line-height: 1.1; margin-bottom: 8px; }
.setup-hero h1 span { color: var(--accent); }
.setup-hero p { color: var(--muted); font-size: 14px; line-height: 1.5; }
.setup-content { padding: 0 24px 130px; flex: 1; }
.field-group { margin-bottom: 20px; }
.category-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
.cat-name-input { flex: 2; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 13px; font-size: 14px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.15s; }
.cat-name-input:focus { border-color: var(--accent); }
.cat-name-input::placeholder { color: var(--muted); font-weight: 400; font-size: 13px; }
.cat-budget-input { flex: 1.1; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 13px; font-size: 14px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; outline: none; transition: border-color 0.15s; }
.cat-budget-input:focus { border-color: var(--accent); }
.cat-budget-input::placeholder { color: var(--muted); font-weight: 400; }
.remove-cat { width: 34px; height: 34px; border-radius: 50%; background: none; border: 1.5px solid var(--border); color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.remove-cat:active { border-color: var(--red); color: var(--red); }
.add-cat-btn { width: 100%; padding: 12px; background: none; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; margin-top: 4px; }
.add-cat-btn:active { border-color: var(--accent); color: var(--accent); }

/* DASHBOARD */
.dash-header { padding: 48px 24px 0; flex-shrink: 0; }
.dash-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.dash-month { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.settings-btn { width: 36px; height: 36px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 16px; }
.settings-btn:active { border-color: var(--accent); color: var(--accent); }
.hero-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; position: relative; overflow: hidden; }
.hero-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(110,231,183,0.07) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
.hero-row { display: flex; }
.hero-divider { width: 1px; background: var(--border); margin: 0 12px; align-self: stretch; }
.hero-stat { flex: 1; }
.hero-stat-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.hero-stat-val { font-size: 19px; font-weight: 700; }
.clr-green { color: var(--green); }
.clr-red   { color: var(--red); }
.alerts-bar { margin: 10px 24px 0; display: flex; flex-direction: column; gap: 6px; }
.alert-chip { padding: 8px 13px; border-radius: 8px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 7px; line-height: 1.3; }
.alert-chip.warn   { background: rgba(245,158,11,0.1); color: var(--yellow); border: 1px solid rgba(245,158,11,0.22); }
.alert-chip.danger { background: rgba(239,68,68,0.1);  color: var(--red);    border: 1px solid rgba(239,68,68,0.22); }
.categories-list { padding: 14px 24px 150px; flex: 1; }
.cat-section-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.cat-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.cat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; }
.cat-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cat-name { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.cat-remaining      { font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace; }
.cat-remaining.safe { color: var(--green); }
.cat-remaining.warn { color: var(--yellow); }
.cat-remaining.over { color: var(--red); }
.progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
.progress-fill      { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.progress-fill.safe { background: var(--green); }
.progress-fill.warn { background: var(--yellow); }
.progress-fill.over { background: var(--red); }
.cat-card-bottom { display: flex; justify-content: space-between; }
.cat-foot { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* AGREGAR GASTO */
.add-header { padding: 50px 24px 16px; flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
.back-btn { width: 36px; height: 36px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 22px; line-height: 1; flex-shrink: 0; }
.back-btn:active { border-color: var(--accent); color: var(--accent); }
.screen-title { font-size: 22px; font-weight: 800; }
.add-content { padding: 0 24px 160px; flex: 1; overflow-y: auto; }
.amount-display { text-align: center; padding: 16px 0 14px; }
.amount-prefix { font-size: 26px; font-weight: 700; color: var(--muted); vertical-align: super; margin-right: 3px; }
.amount-value  { font-size: 52px; font-weight: 800; font-family: 'DM Mono', monospace; letter-spacing: -2px; color: var(--text); }
.amount-cursor { display: inline-block; width: 3px; height: 48px; background: var(--accent); margin-left: 2px; vertical-align: middle; animation: blink 1s infinite; }
@keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
.cat-picker { margin-bottom: 14px; }
.cat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.cat-chip { padding: 9px 15px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; user-select: none; transition: all 0.15s; }
.cat-chip:active { transform: scale(0.95); }
.cat-chip.selected { background: rgba(110,231,183,0.1); border-color: var(--accent); color: var(--accent); }
.date-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 14px; }
.date-row-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.date-row-val   { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.num-btn { padding: 17px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 22px; font-weight: 700; color: var(--text); cursor: pointer; font-family: 'DM Mono', monospace; text-align: center; user-select: none; transition: all 0.1s; }
.num-btn:active { background: var(--surface2); transform: scale(0.94); }
.num-btn.del  { color: var(--muted); font-size: 18px; }
.num-btn.zero { grid-column: span 2; }

/* RESUMEN */
.summary-header  { padding: 50px 24px 16px; flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
.summary-content { padding: 0 24px 80px; flex: 1; }
.summary-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
.summary-row:last-child { border-bottom: none; }
.summary-key { font-size: 13px; color: var(--muted); font-weight: 600; }
.summary-val { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; }
.summary-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 8px; }
.summary-item-name { font-size: 14px; font-weight: 600; }
.summary-item-val  { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; }
.reset-btn { width: 100%; margin-top: 20px; padding: 15px; background: none; color: var(--muted); border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; }
.reset-btn:active { border-color: var(--red); color: var(--red); }

/* FAB + NAV */
.fab { position: fixed; bottom: 54px; left: 50%; transform: translateX(-50%); z-index: 190; }
.fab-btn { width: 62px; height: 62px; background: var(--accent); color: #071a12; border: none; border-radius: 50%; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 28px rgba(110,231,183,0.32); transition: all 0.15s; }
.fab-btn:active { transform: scale(0.91); }
.fab-hidden { display: none !important; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: var(--bg); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding: 10px 0 20px; z-index: 180; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; color: var(--muted); padding: 6px 24px; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-icon  { font-size: 20px; }
.nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; }

.toast { position: fixed; top: 58px; left: 50%; transform: translateX(-50%) translateY(-16px); background: var(--surface); border: 1.5px solid var(--border); border-radius: 99px; padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--text); z-index: 999; opacity: 0; transition: all 0.28s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
::-webkit-scrollbar { width: 0; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.empty-icon { font-size: 38px; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="app">

  <!-- CONFIGURACION -->
  <div id="setup-screen" class="screen active">
    <div class="setup-hero">
      <h1>Configurá tu<br><span>presupuesto mensual</span></h1>
      <p>Ingresá tus ingresos y asigná un límite a cada categoría de gasto.</p>
    </div>
    <div class="setup-content">
      <div class="field-group">
        <label class="field-label">Ingresos mensuales</label>
        <input type="number" class="field-input" id="income-input" placeholder="ej. 500000" inputmode="decimal">
      </div>
      <div class="section-title">Categorías</div>
      <div id="categories-setup"></div>
      <button class="add-cat-btn" onclick="addCategoryRow()">+ Agregar categoría</button>
    </div>
    <div class="fixed-bottom">
      <button class="btn-primary" id="setup-btn" onclick="startBudget()">Empezar a registrar →</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-screen" class="screen">
    <div class="dash-header">
      <div class="dash-top">
        <div class="dash-month" id="dash-month-label">MARZO 2026</div>
        <div class="settings-btn" onclick="goToSettings()">&#9881;</div>
      </div>
      <div class="hero-card">
        <div class="hero-row">
          <div class="hero-stat">
            <div class="hero-stat-label">Disponible</div>
            <div class="hero-stat-val" id="dash-remaining">$0</div>
          </div>
          <div class="hero-divider"></div>
          <div class="hero-stat" style="margin-left:12px">
            <div class="hero-stat-label">Gastado</div>
            <div class="hero-stat-val" id="dash-spent">$0</div>
          </div>
          <div class="hero-divider"></div>
          <div class="hero-stat" style="margin-left:12px">
            <div class="hero-stat-label">Ahorrado</div>
            <div class="hero-stat-val" id="dash-savings">$0</div>
          </div>
        </div>
      </div>
    </div>
    <div id="alerts-container" class="alerts-bar"></div>
    <div class="categories-list">
      <div class="cat-section-label">Categorías</div>
      <div id="cat-cards"></div>
    </div>
  </div>

  <!-- AGREGAR GASTO -->
  <div id="add-expense-screen" class="screen">
    <div class="add-header">
      <div class="back-btn" onclick="goTo('dashboard')">&#8249;</div>
      <div class="screen-title">Registrar gasto</div>
    </div>
    <div class="add-content">
      <div class="amount-display">
        <span class="amount-prefix">$</span><span class="amount-value" id="amount-display">0</span><span class="amount-cursor"></span>
      </div>
      <div class="cat-picker">
        <span class="field-label">Categoría</span>
        <div class="cat-chips" id="cat-chips"></div>
      </div>
      <div class="date-row">
        <span class="date-row-label">Fecha</span>
        <span class="date-row-val" id="expense-date"></span>
      </div>
      <div class="numpad">
        <div class="num-btn" onclick="numPress('1')">1</div>
        <div class="num-btn" onclick="numPress('2')">2</div>
        <div class="num-btn" onclick="numPress('3')">3</div>
        <div class="num-btn" onclick="numPress('4')">4</div>
        <div class="num-btn" onclick="numPress('5')">5</div>
        <div class="num-btn" onclick="numPress('6')">6</div>
        <div class="num-btn" onclick="numPress('7')">7</div>
        <div class="num-btn" onclick="numPress('8')">8</div>
        <div class="num-btn" onclick="numPress('9')">9</div>
        <div class="num-btn" onclick="numPress(',')">','</div>
        <div class="num-btn zero" onclick="numPress('0')">0</div>
        <div class="num-btn del" onclick="numDel()">&#9003;</div>
      </div>
    </div>
    <div class="fixed-bottom">
      <button class="btn-primary" onclick="confirmExpense()">&#10003; &nbsp;Guardar gasto</button>
    </div>
  </div>

  <!-- RESUMEN -->
  <div id="summary-screen" class="screen">
    <div class="summary-header">
      <div class="back-btn" onclick="goTo('dashboard')">&#8249;</div>
      <div class="screen-title">Resumen del mes</div>
    </div>
    <div class="summary-content" id="summary-content"></div>
  </div>

  <!-- Boton flotante -->
  <div class="fab" id="fab">
    <button class="fab-btn" onclick="goTo('add-expense')">+</button>
  </div>

  <!-- Nav inferior -->
  <nav class="bottom-nav" id="bottom-nav" style="display:none">
    <button class="nav-btn active" id="nav-dash" onclick="goTo('dashboard')">
      <span class="nav-icon">&#9672;</span>
      <span class="nav-label">Presupuesto</span>
    </button>
    <button class="nav-btn" id="nav-sum" onclick="goTo('summary')">
      <span class="nav-icon">&#9678;</span>
      <span class="nav-label">Resumen</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script>
var state = { income: 0, categories: [], expenses: [], isSetup: false };
var amountStr = '';
var selectedCatId = null;

var EMOJIS  = ['F0 9F 8D 95','F0 9F 9A 97','F0 9F 8E AC','F0 9F 8F A0','F0 9F 92 8A','F0 9F 91 95','F0 9F 93 9A','E2 9C 88 EF B8 8F','E2 98 95','F0 9F 8F 8B EF B8 8F','F0 9F 8E AE','F0 9F 9B 92','F0 9F 90 BE','F0 9F 8E 81','F0 9F 92 A1'];
var EMOJIS2 = ['🍕','🚗','🎬','🏠','💊','👕','📚','✈️','☕','🏋️','🎮','🛒','🐾','🎁','💡'];
var MESES   = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
var MESES_C = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
var DIAS    = ['dom','lun','mar','mi\u00e9','jue','vie','s\u00e1b'];

function save() { try { localStorage.setItem('mipresupuesto_v4', JSON.stringify(state)); } catch(e){} }
function load() { try { var d = localStorage.getItem('mipresupuesto_v4'); if (d) state = JSON.parse(d); } catch(e){} }

function goTo(screen) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(screen + '-screen').classList.add('active');
  var fab = document.getElementById('fab');
  var nav = document.getElementById('bottom-nav');
  if (screen === 'dashboard') {
    fab.classList.remove('fab-hidden'); nav.style.display = 'flex';
    document.getElementById('nav-dash').classList.add('active');
    document.getElementById('nav-sum').classList.remove('active');
    renderDashboard();
  } else if (screen === 'add-expense') {
    fab.classList.add('fab-hidden'); nav.style.display = 'none';
    initAddExpense();
  } else if (screen === 'summary') {
    fab.classList.add('fab-hidden'); nav.style.display = 'flex';
    document.getElementById('nav-sum').classList.add('active');
    document.getElementById('nav-dash').classList.remove('active');
    renderSummary();
  } else {
    fab.classList.add('fab-hidden'); nav.style.display = 'none';
  }
}

var DEFAULT_CATS = [
  { name: 'Comida y salidas', budget: '' },
  { name: 'Transporte', budget: '' },
  { name: 'Entretenimiento', budget: '' }
];

function renderSetup() {
  var el = document.getElementById('categories-setup');
  var html = '';
  for (var i = 0; i < state.categories.length; i++) {
    var c = state.categories[i];
    html += '<div class="category-row">' +
      '<input class="cat-name-input" placeholder="Nombre" value="' + escHtml(c.name) + '" oninput="updateCatName(\'' + c.id + '\',this.value)">' +
      '<input class="cat-budget-input" type="number" placeholder="$0" value="' + (c.budget || '') + '" oninput="updateCatBudget(\'' + c.id + '\',this.value)" inputmode="decimal">' +
      '<button class="remove-cat" onclick="removeCat(\'' + c.id + '\')">&#215;</button>' +
      '</div>';
  }
  el.innerHTML = html;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addCategoryRow() {
  state.categories.push({ id: Date.now().toString(), name: '', budget: 0, spent: 0 });
  renderSetup();
  setTimeout(function() { var ins = document.querySelectorAll('.cat-name-input'); if(ins.length) ins[ins.length-1].focus(); }, 50);
}
function updateCatName(id, v)   { for(var i=0;i<state.categories.length;i++) if(state.categories[i].id===id) { state.categories[i].name=v; break; } }
function updateCatBudget(id, v) { for(var i=0;i<state.categories.length;i++) if(state.categories[i].id===id) { state.categories[i].budget=parseFloat(v)||0; break; } }
function removeCat(id) { state.categories = state.categories.filter(function(c){ return c.id !== id; }); renderSetup(); }

function startBudget() {
  var income = parseFloat(document.getElementById('income-input').value);
  if (!income || income <= 0) { showToast('Ingres\u00e1 tus ingresos mensuales'); return; }
  var valid = state.categories.filter(function(c){ return c.name.trim() && c.budget > 0; });
  if (!valid.length) { showToast('Agreg\u00e1 al menos una categor\u00eda con presupuesto'); return; }
  state.income = income;
  for (var i = 0; i < valid.length; i++) {
    if (!valid[i].spent) valid[i].spent = 0;
    if (!valid[i].emoji) valid[i].emoji = EMOJIS2[i % EMOJIS2.length];
  }
  state.categories = valid;
  state.isSetup = true;
  save(); resetSetupBtn(); goTo('dashboard');
}

function goToSettings() {
  document.getElementById('income-input').value = state.income;
  renderSetup(); goTo('setup');
  var btn = document.getElementById('setup-btn');
  btn.textContent = 'Guardar cambios \u2192';
  btn.onclick = saveSettings;
}

function saveSettings() {
  var income = parseFloat(document.getElementById('income-input').value);
  if (!income || income <= 0) { showToast('Ingres\u00e1 tus ingresos'); return; }
  var valid = state.categories.filter(function(c){ return c.name.trim() && c.budget > 0; });
  if (!valid.length) { showToast('Agreg\u00e1 al menos una categor\u00eda'); return; }
  state.income = income;
  for (var i = 0; i < valid.length; i++) {
    var orig = null;
    for (var j = 0; j < state.categories.length; j++) if (state.categories[j].id === valid[i].id) { orig = state.categories[j]; break; }
    valid[i].spent = orig ? (orig.spent || 0) : 0;
    valid[i].emoji = orig ? (orig.emoji || EMOJIS2[i % EMOJIS2.length]) : EMOJIS2[i % EMOJIS2.length];
  }
  state.categories = valid;
  save(); resetSetupBtn(); goTo('dashboard');
}

function resetSetupBtn() {
  var btn = document.getElementById('setup-btn');
  btn.textContent = 'Empezar a registrar \u2192';
  btn.onclick = startBudget;
}

function fmt(n) {
  var abs = Math.abs(n);
  var s = abs.toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  return (n < 0 ? '-' : '') + '$' + s;
}

function renderDashboard() {
  var now = new Date();
  document.getElementById('dash-month-label').textContent = MESES[now.getMonth()] + ' ' + now.getFullYear();
  var totalBudget = 0, totalSpent = 0;
  for (var i = 0; i < state.categories.length; i++) { totalBudget += state.categories[i].budget; totalSpent += state.categories[i].spent; }
  var remaining = totalBudget - totalSpent;
  var savings   = state.income - totalSpent;

  var remEl = document.getElementById('dash-remaining');
  remEl.textContent = fmt(remaining);
  remEl.className = 'hero-stat-val ' + (remaining >= 0 ? 'clr-green' : 'clr-red');
  document.getElementById('dash-spent').textContent = fmt(totalSpent);
  var savEl = document.getElementById('dash-savings');
  savEl.textContent = fmt(savings);
  savEl.className = 'hero-stat-val ' + (savings >= 0 ? 'clr-green' : 'clr-red');

  var alertsEl = document.getElementById('alerts-container');
  alertsEl.innerHTML = '';
  for (var i = 0; i < state.categories.length; i++) {
    var c = state.categories[i];
    var pct = c.budget > 0 ? c.spent / c.budget : 0;
    if (c.spent > c.budget)
      alertsEl.innerHTML += '<div class="alert-chip danger">&#128680; Superaste el l\u00edmite en <b>' + escHtml(c.name) + '</b></div>';
    else if (pct >= 0.85)
      alertsEl.innerHTML += '<div class="alert-chip warn">&#9888; Cerca del l\u00edmite en <b>' + escHtml(c.name) + '</b></div>';
  }

  var catEl = document.getElementById('cat-cards');
  if (!state.categories.length) { catEl.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128202;</div>Sin categor\u00edas.</div>'; return; }
  var html = '';
  for (var i = 0; i < state.categories.length; i++) {
    var c = state.categories[i];
    var pct  = c.budget > 0 ? Math.min(c.spent / c.budget, 1) : 0;
    var over = c.spent > c.budget;
    var warn = !over && pct >= 0.75;
    var cls  = over ? 'over' : warn ? 'warn' : 'safe';
    var fill = Math.min(pct * 100, 100).toFixed(1);
    var label = over ? '&#9650; ' + fmt(c.spent - c.budget) + ' excedido' : fmt(c.budget - c.spent) + ' disponible';
    html += '<div class="cat-card">' +
      '<div class="cat-card-top">' +
        '<div class="cat-name">' + (c.emoji || '') + ' ' + escHtml(c.name) + '</div>' +
        '<div class="cat-remaining ' + cls + '">' + label + '</div>' +
      '</div>' +
      '<div class="progress-track"><div class="progress-fill ' + cls + '" style="width:' + fill + '%"></div></div>' +
      '<div class="cat-card-bottom">' +
        '<span class="cat-foot">Gastado: ' + fmt(c.spent) + '</span>' +
        '<span class="cat-foot">L\u00edmite: ' + fmt(c.budget) + '</span>' +
      '</div></div>';
  }
  catEl.innerHTML = html;
}

function initAddExpense() {
  amountStr = ''; selectedCatId = null; updateAmountDisplay();
  var now = new Date();
  document.getElementById('expense-date').textContent = DIAS[now.getDay()] + ' ' + now.getDate() + ' de ' + MESES_C[now.getMonth()];
  var html = '';
  for (var i = 0; i < state.categories.length; i++) {
    var c = state.categories[i];
    html += '<div class="cat-chip" id="chip-' + c.id + '" onclick="selectCat(\'' + c.id + '\')">' + (c.emoji || '') + ' ' + escHtml(c.name) + '</div>';
  }
  document.getElementById('cat-chips').innerHTML = html;
}

function updateAmountDisplay() {
  document.getElementById('amount-display').textContent = amountStr || '0';
}

function numPress(v) {
  if ((v === ',' || v === '.') && (amountStr.indexOf(',') >= 0 || amountStr.indexOf('.') >= 0)) return;
  if ((v === ',' || v === '.') && amountStr === '') amountStr = '0';
  if (amountStr.length >= 10) return;
  amountStr += v; updateAmountDisplay();
}

function numDel() { amountStr = amountStr.slice(0, -1); updateAmountDisplay(); }

function selectCat(id) {
  selectedCatId = id;
  var chips = document.querySelectorAll('.cat-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('selected');
  var el = document.getElementById('chip-' + id); if (el) el.classList.add('selected');
}

function confirmExpense() {
  var amount = parseFloat(amountStr.replace(',', '.'));
  if (!amount || amount <= 0) { showToast('Ingres\u00e1 un monto primero'); return; }
  if (!selectedCatId)         { showToast('Selecion\u00e1 una categor\u00eda'); return; }
  var cat = null;
  for (var i = 0; i < state.categories.length; i++) if (state.categories[i].id === selectedCatId) { cat = state.categories[i]; break; }
  if (!cat) return;
  cat.spent += amount;
  state.expenses.push({ id: Date.now().toString(), categoryId: selectedCatId, amount: amount, date: new Date().toISOString() });
  save();
  showToast(fmt(amount) + ' guardado en ' + cat.name);
  goTo('dashboard');
}

function renderSummary() {
  var totalBudget = 0, totalSpent = 0;
  for (var i = 0; i < state.categories.length; i++) { totalBudget += state.categories[i].budget; totalSpent += state.categories[i].spent; }
  var savings = state.income - totalSpent;
  var exceeded = state.categories.filter(function(c){ return c.spent > c.budget; });
  var under    = state.categories.filter(function(c){ return c.spent < c.budget; });

  var html = '<div class="summary-card">' +
    '<div class="summary-row"><span class="summary-key">Ingresos del mes</span><span class="summary-val">' + fmt(state.income) + '</span></div>' +
    '<div class="summary-row"><span class="summary-key">Presupuesto total</span><span class="summary-val">' + fmt(totalBudget) + '</span></div>' +
    '<div class="summary-row"><span class="summary-key">Total gastado</span><span class="summary-val">' + fmt(totalSpent) + '</span></div>' +
    '<div class="summary-row"><span class="summary-key">Ahorro potencial</span><span class="summary-val" style="color:' + (savings >= 0 ? 'var(--green)' : 'var(--red)') + '">' + fmt(savings) + '</span></div>' +
    '</div>';

  if (exceeded.length) {
    html += '<div class="cat-section-label">Categor\u00edas excedidas</div>';
    for (var i = 0; i < exceeded.length; i++)
      html += '<div class="summary-item"><span class="summary-item-name">' + (exceeded[i].emoji||'') + ' ' + escHtml(exceeded[i].name) + '</span><span class="summary-item-val" style="color:var(--red)">&#9650; ' + fmt(exceeded[i].spent - exceeded[i].budget) + '</span></div>';
  }
  if (under.length) {
    html += '<div class="cat-section-label" style="margin-top:20px">Dentro del presupuesto</div>';
    for (var i = 0; i < under.length; i++)
      html += '<div class="summary-item"><span class="summary-item-name">' + (under[i].emoji||'') + ' ' + escHtml(under[i].name) + '</span><span class="summary-item-val" style="color:var(--green)">&#9660; ' + fmt(under[i].budget - under[i].spent) + ' ahorrado</span></div>';
  }
  html += '<button class="reset-btn" onclick="resetMonth()">Reiniciar mes</button>';
  document.getElementById('summary-content').innerHTML = html;
}

function resetMonth() {
  if (!confirm('&#191;Reiniciar todos los gastos? El presupuesto configurado se mantiene.')) return;
  for (var i = 0; i < state.categories.length; i++) state.categories[i].spent = 0;
  state.expenses = [];
  save(); showToast('&#161;Mes reiniciado!'); goTo('dashboard');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.innerHTML = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

load();
var now = new Date();
document.getElementById('dash-month-label').textContent = MESES[now.getMonth()] + ' ' + now.getFullYear();

if (state.isSetup && state.categories.length > 0) {
  goTo('dashboard');
} else {
  for (var i = 0; i < DEFAULT_CATS.length; i++) {
    state.categories.push({ id: (Date.now() + i).toString(), name: DEFAULT_CATS[i].name, budget: 0, spent: 0, emoji: EMOJIS2[i] });
  }
  renderSetup();
}
</script>
</body>
</html>
